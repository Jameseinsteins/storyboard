<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a36"/>
      <stop offset="100%" stop-color="#060b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#fbbf24" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow circle -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#fbbf24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- "JA" monogram -->
  <text x="256" y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="210"
    font-weight="700"
    text-anchor="middle"
    fill="#fbbf24"
    filter="url(#shadow)"
    letter-spacing="-8">JA</text>

  <!-- Bottom accent line -->
  <rect x="156" y="352" width="200" height="3" rx="2" fill="#fbbf24" opacity="0.5"/>

  <!-- Small music note top-right -->
  <text x="390" y="150" font-size="52" text-anchor="middle" opacity="0.35">🎵</text>
  <!-- Small basketball bottom-left -->
  <text x="122" y="400" font-size="48" text-anchor="middle" opacity="0.30">🏀</text>
</svg>
